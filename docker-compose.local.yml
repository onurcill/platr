services:

  backend:
    image: ghcr.io/onurcill/platr-backend:latest
    restart: unless-stopped
    environment:
      APP_ENV: production
      PORT: "8080"
      DB_PATH: /data/platr.db
      JWT_SECRET: "${JWT_SECRET}"
      APP_URL: http://localhost:3000
    volumes:
      - platr_db:/data
    networks:
      - platr

  frontend:
    image: ghcr.io/onurcill/platr-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - platr

volumes:
  platr_db:

networks:
  platr: