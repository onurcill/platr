# Platr — Lokal Kurulum
# Kullanım: docker compose up -d
# Arayüz: http://localhost:8095

services:

  backend:
    image: ghcr.io/onurcill/platr-backend:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"] # Or a similar endpoint
      interval: 5s
      timeout: 3s
      retries: 5
    environment:
      APP_ENV: production
      PORT: "8080"
      DB_PATH: /data/platr.db
      JWT_SECRET: ${JWT_SECRET:Q1WMN5a+ibVyJgjNZtAnlttdUmSTsh3wl92hobLNZ9U=}
      APP_URL: http://localhost:8095
    volumes:
      - platr_db:/data
    networks:
      - platr

  frontend:
    image: ghcr.io/onurcill/platr-frontend:latest
    restart: unless-stopped
    ports:
      - "8095:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - platr

volumes:
  platr_db:

networks:
  platr:
