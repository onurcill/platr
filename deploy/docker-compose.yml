services:

  backend:
    build:
      context: ..
      dockerfile: deploy/backend/Dockerfile
    image: platr-backend:latest
    restart: unless-stopped
    dns:
      - 10.10.41.52
    environment:
      APP_ENV:               production
      PORT:                  "8080"
      DB_PATH:               /data/platr.db
      JWT_SECRET:            ${JWT_SECRET}
      APP_URL:               ${APP_URL}
      SMTP_HOST:             ${SMTP_HOST:-}
      SMTP_PORT:             ${SMTP_PORT:-587}
      SMTP_USER:             ${SMTP_USER:-}
      SMTP_PASSWORD:         ${SMTP_PASSWORD:-}
      SMTP_FROM:             ${SMTP_FROM:-}
      STRIPE_SECRET_KEY:     ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - db_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/billing/plans; exit 0"]
      interval: 15s
      timeout:  5s
      retries:  3
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: deploy/frontend/Dockerfile
    image: platr-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8095:80"
    networks:
      - internal
      - web

volumes:
  db_data: { driver: local }

networks:
  internal:
    internal: true
  web:
